<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Timetable Management System - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-container">
    <!-- Left Section -->
    <div class="login-left">
      <div class="login-brand">
        <i class="fa-solid fa-building-columns"></i>
        <h1 style="font-size: 40px;">University Timetable Management System</h1>

        <p>A user-friendly timetable management system for smooth academic scheduling</p>
      </div>
      <div class="login-illustration">
        <!-- <i class="fas fa-calendar-alt"></i> -->
         <!-- <i class="fa-solid fa-building-columns"></i> -->
          <i class="fa-solid fa-calendar-days"></i>


      </div>
    </div>

    <!-- Right Section - Login Form -->
    <div class="login-right">
      <div class="login-form-container">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Sign in to access your dashboard</p>
        
        <div id="login-alert" class="alert-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">
              <i class="fas fa-user"></i> Username / Email
            </label>
            <input 
              type="text" 
              id="username" 
              placeholder="Enter your username or email"
              autocomplete="username"
              required
            >
          </div>

          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i> Password
            </label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="password" 
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="toggle-password" onclick="togglePassword()">
                <i class="fas fa-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="form-group-checkbox">
            <label>
              <input type="checkbox" id="rememberMe">
              <span>Remember me</span>
            </label>
          </div>

          <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
        </form>

      </div>
    </div>
  </div>

  <script>
    // Predefined users
    const USERS = {
      admin: { password: 'admin123', role: 'admin', redirect: 'admin.html' },
      student1: { password: 'student123', role: 'student', redirect: 'student.html' },
      student2: { password: 'student123', role: 'student', redirect: 'student.html' }
    };

    // Check if user is already logged in
    window.onload = function() {
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser) {
        const user = JSON.parse(savedUser);
        if (user.rememberMe) {
          window.location.href = user.redirect;
        }
      }
    };

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function showAlert(message, type) {
      const alertDiv = document.getElementById('login-alert');
      alertDiv.innerHTML = `
        <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
        ${message}
      `;
      alertDiv.className = `alert-message ${type}`;
      alertDiv.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => {
          alertDiv.style.display = 'none';
        }, 2000);
      }
    }

    async function handleLogin(event) {
  event.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Invalid login");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(data));

  if (data.role === "admin") window.location.href = "admin.html";
  if (data.role === "teacher") window.location.href = "teacher.html";
  if (data.role === "student") window.location.href = "student.html";
}
  </script>
</body>
</html>
